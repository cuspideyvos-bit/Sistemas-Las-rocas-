    const DollarSign   = ({size=24,className=''}) => <LucideIcon size={size} className={className}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></LucideIcon>;
    const MapPin       = ({size=24,className=''}) => <LucideIcon size={size} className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></LucideIcon>;

    const FileText     = ({size=24,className=''}) => <LucideIcon size={size} className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></LucideIcon>;

    const AlertTriangle= ({size=24,className=''}) => <LucideIcon size={size} className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></LucideIcon>;



function SistemaLasRocas() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [currentUser, setCurrentUser] = useState('');
  const [currentMonth, setCurrentMonth] = useState(new Date());
  const [mesesPorCabana, setMesesPorCabana] = useState({
    1: new Date(), 2: new Date(), 3: new Date(), 4: new Date(), 5: new Date(),
    6: new Date(), 7: new Date(), 8: new Date(), 9: new Date()
  });
  const [reservas, setReservas] = useState([]);
  const [gastos, setGastos] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [view, setView] = useState('dashboard'); // Ahora inicia en dashboard
  const [loading, setLoading] = useState(true);
  const [showChangePassword, setShowChangePassword] = useState(false);
  const [passwordForm, setPasswordForm] = useState({ current: '', new: '', confirm: '' });
  const [alertMessage, setAlertMessage] = useState({ show: false, type: '', message: '' });
  const [showRestoreBackup, setShowRestoreBackup] = useState(false);
  const [backupFile, setBackupFile] = useState(null);
  const [backupPreview, setBackupPreview] = useState(null);
  const [showFormGasto, setShowFormGasto] = useState(false);
  const [gastoMesActual, setGastoMesActual] = useState(null);
  const [rangoFechas, setRangoFechas] = useState({ desde: '', hasta: '' });
  const [searchTerm, setSearchTerm] = useState('');
  const [showFilters, setShowFilters] = useState(false);
  const [filters, setFilters] = useState({ cabaña: 'todas', estado: 'todos' });
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem('las_rocas_darkmode') === 'true'; } catch { return false; }
  });

  useEffect(() => {
    document.body.style.backgroundColor = darkMode ? '#111827' : '#f9fafb';
    try { localStorage.setItem('las_rocas_darkmode', darkMode); } catch {}
  }, [darkMode]);
  const [showNotesModal, setShowNotesModal] = useState(false);
  const [currentReservaForNotes, setCurrentReservaForNotes] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState({ show: false, id: null, nombre: '', cabana: '' });
  const [tarifas, setTarifas] = useState({
    temporadaAlta: 120000,
    temporadaMedia: 90000,
    temporadaBaja: 70000
  });
  
  const initialFormData = {
    cabaña: 1,
    fechaEntrada: '',
    fechaSalida: '',
    fechaSalidaReal: '',
    clienteNombre: '',
    clienteContacto: '',
    cantidadPersonas: 1,
    precioPorDia: 90000,
    pagado: false,
    pagoACuenta: false,
    montoPagado: 0,
    metodoPagoACuenta: '',
    metodoPago: '',
    notas: '',
    tags: [],
    rating: 0,
    temporada: 'media'
  };

  const [formData, setFormData] = useState(initialFormData);

  const categoriasGastos = [
    'Luz', 'Agua', 'Gas', 'Impuesto Municipal', 'Impuesto Provincial',
    'Gastos Bancarios', 'Limpieza', 'Habilitaciones', 'Jardinería',
    'Inversiones', 'Mantenimiento', 'Mermas y Roturas'
  ];

  const tagsDisponibles = ['VIP', 'Frecuente', 'Corporativo', 'Familia', 'Pareja', 'Grupo'];
  const temporadas = ['alta', 'media', 'baja'];

  const loadUsuarios = () => {
    try {
      const stored = localStorage.getItem('las_rocas_usuarios');
      return stored ? JSON.parse(stored) : { Roberto: 'Roberto1908' };
    } catch {
      return { Roberto: 'Roberto1908' };
    }
  };

  const [usuarios, setUsuarios] = useState(loadUsuarios());

  const showAlert = (type, message) => {
    setAlertMessage({ show: true, type, message });
    setTimeout(() => setAlertMessage({ show: false, type: '', message: '' }), 5000);
  };

  const generarColorAleatorio = (id) => {
    const colores = [
      'from-red-500 to-red-700', 'from-orange-500 to-orange-700', 'from-amber-500 to-amber-700',
      'from-yellow-500 to-yellow-700', 'from-lime-500 to-lime-700', 'from-green-500 to-green-700',
      'from-emerald-500 to-emerald-700', 'from-teal-500 to-teal-700', 'from-cyan-500 to-cyan-700',
      'from-sky-500 to-sky-700', 'from-blue-500 to-blue-700', 'from-indigo-500 to-indigo-700',
      'from-violet-500 to-violet-700', 'from-purple-500 to-purple-700', 'from-fuchsia-500 to-fuchsia-700',
      'from-pink-500 to-pink-700', 'from-rose-500 to-rose-700'
    ];
    return colores[id % colores.length];
  };

  const formatearFecha = (fecha) => {
    if (!fecha) return '';
    const [year, month, day] = fecha.split('-');
    return `${day}/${month}/${year}`;
  };

  const formatearMoneda = (valor) => {
    return new Intl.NumberFormat('es-AR', {
      style: 'currency',
      currency: 'ARS',
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    }).format(valor);
  };

  useEffect(() => {
    try {
      const resultado = localStorage.getItem('las_rocas_data_v29');
      if (resultado) setReservas(JSON.parse(resultado));
      const resultadoGastos = localStorage.getItem('las_rocas_gastos_v29');
      if (resultadoGastos) setGastos(JSON.parse(resultadoGastos));
      const resultadoTarifas = localStorage.getItem('las_rocas_tarifas');
      if (resultadoTarifas) setTarifas(JSON.parse(resultadoTarifas));
    } catch (e) {
      console.warn('Error al cargar datos:', e);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    if (!loading) {
      try {
        localStorage.setItem('las_rocas_data_v29', JSON.stringify(reservas));
      } catch (e) {
        console.warn('Error guardando reservas:', e);
      }
    }
  }, [reservas, loading]);

  useEffect(() => {
    if (!loading) {
      try {
        localStorage.setItem('las_rocas_gastos_v29', JSON.stringify(gastos));
      } catch (e) {
        console.warn('Error guardando gastos:', e);
      }
    }
  }, [gastos, loading]);

  useEffect(() => {
    if (!loading) {
      try {
        localStorage.setItem('las_rocas_tarifas', JSON.stringify(tarifas));
      } catch (e) {
        console.warn('Error guardando tarifas:', e);
      }
    }
  }, [tarifas, loading]);

  const handleLogin = () => {
    const usuariosActuales = loadUsuarios();
    if (usuariosActuales[username] === password) {
      setLoggedIn(true);
      setCurrentUser(username);
      showAlert('success', `✅ Bienvenido ${username}!`);
    } else {
      showAlert('error', '❌ Usuario o contraseña incorrectos');
    }
  };

  const handleChangePassword = () => {
    if (!passwordForm.current || !passwordForm.new || !passwordForm.confirm) {
      showAlert('error', '⚠️ Completa todos los campos');
      return;
    }

    if (usuarios[currentUser] !== passwordForm.current) {
      showAlert('error', '❌ Contraseña actual incorrecta');
      return;
    }

    if (passwordForm.new !== passwordForm.confirm) {
      showAlert('error', '❌ Las contraseñas nuevas no coinciden');
      return;
    }

    if (passwordForm.new.length < 6) {
      showAlert('error', '⚠️ La contraseña debe tener al menos 6 caracteres');
      return;
    }

    const nuevosUsuarios = { ...usuarios, [currentUser]: passwordForm.new };
    setUsuarios(nuevosUsuarios);
    localStorage.setItem('las_rocas_usuarios', JSON.stringify(nuevosUsuarios));
    
    setPasswordForm({ current: '', new: '', confirm: '' });
    setShowChangePassword(false);
    showAlert('success', '✅ Contraseña cambiada exitosamente');
  };

  const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
  const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

  const calcularDias = (fechaEntrada, fechaSalida) => {
    if (!fechaEntrada || !fechaSalida) return 0;
    const entrada = new Date(fechaEntrada);
    const salida = new Date(fechaSalida);
    const dias = Math.ceil((salida - entrada) / (1000 * 60 * 60 * 24)) + 1;
    return dias;
  };

  const calcularImporteTotal = () => {
    const dias = calcularDias(formData.fechaEntrada, formData.fechaSalida);
    return dias * formData.precioPorDia;
  };

  const calcularTotal = (reserva) => {
    const entrada = new Date(reserva.fechaEntrada);
    const salida = new Date(reserva.fechaSalida);
    const dias = Math.ceil((salida - entrada) / (1000 * 60 * 60 * 24)) + 1;
    return dias * reserva.precioPorDia;
  };

  const getGastosMes = () => {
    const mes = currentMonth.getMonth();
    const ano = currentMonth.getFullYear();
    const key = `${ano}-${String(mes + 1).padStart(2, '0')}`;
    return gastos.find(g => g.mesAno === key) || null;
  };

  const calcularTotalGastos = () => {
    const gastoMes = getGastosMes();
    if (!gastoMes) return 0;
    return Object.values(gastoMes.categorias).reduce((sum, val) => sum + (val || 0), 0);
  };

  const calcularEstadisticas = () => {
    const mes = currentMonth.getMonth();
    const ano = currentMonth.getFullYear();
    
    const reservasDelMes = reservas.filter(r => {
      const inicio = new Date(r.fechaEntrada);
      const fin = new Date(r.fechaSalida);
      return (inicio.getMonth() === mes && inicio.getFullYear() === ano) ||
             (fin.getMonth() === mes && fin.getFullYear() === ano) ||
             (inicio < new Date(ano, mes, 1) && fin > new Date(ano, mes + 1, 0));
    });

    let totalPagado = 0;
    let totalPendiente = 0;

    reservasDelMes.forEach(r => {
      const total = calcularTotal(r);
      if (r.pagado) totalPagado += total;
      else totalPendiente += total;
    });

    return {
      total: reservasDelMes.length,
      pagadas: reservasDelMes.filter(r => r.pagado).length,
      pendientes: reservasDelMes.filter(r => !r.pagado).length,
      montoPagado: totalPagado,
      montoPendiente: totalPendiente,
      montoTotal: totalPagado + totalPendiente,
      reservas: reservasDelMes
    };
  };

  const calcularEstadisticasRango = () => {
    if (!rangoFechas.desde || !rangoFechas.hasta) {
      return calcularEstadisticas();
    }

    const [anoDesde, mesDesde] = rangoFechas.desde.split('-');
    const [anoHasta, mesHasta] = rangoFechas.hasta.split('-');
    
    const desde = new Date(parseInt(anoDesde), parseInt(mesDesde) - 1, 1);
    const hasta = new Date(parseInt(anoHasta), parseInt(mesHasta), 0);

    const reservasDelRango = reservas.filter(r => {
      const inicio = new Date(r.fechaEntrada);
      const fin = new Date(r.fechaSalida);
      return (inicio >= desde && inicio <= hasta) ||
             (fin >= desde && fin <= hasta) ||
             (inicio < desde && fin > hasta);
    });

    let totalPagado = 0;
    let totalPendiente = 0;

    reservasDelRango.forEach(r => {
      const total = calcularTotal(r);
      if (r.pagado) totalPagado += total;
      else totalPendiente += total;
    });

    return {
      total: reservasDelRango.length,
      pagadas: reservasDelRango.filter(r => r.pagado).length,
      pendientes: reservasDelRango.filter(r => !r.pagado).length,
      montoPagado: totalPagado,
      montoPendiente: totalPendiente,
      montoTotal: totalPagado + totalPendiente,
      reservas: reservasDelRango
    };
  };

  const calcularGastosRango = () => {
    if (!rangoFechas.desde || !rangoFechas.hasta) {
      return calcularTotalGastos();
    }

    const [anoDesde, mesDesde] = rangoFechas.desde.split('-');
    const [anoHasta, mesHasta] = rangoFechas.hasta.split('-');
    
    const desde = new Date(parseInt(anoDesde), parseInt(mesDesde) - 1, 1);
    const hasta = new Date(parseInt(anoHasta), parseInt(mesHasta) - 1, 1);
    
    let total = 0;
    gastos.forEach(g => {
      const [ano, mes] = g.mesAno.split('-');
      const fechaGasto = new Date(parseInt(ano), parseInt(mes) - 1, 1);
      
      if (fechaGasto >= desde && fechaGasto <= hasta) {
        total += Object.values(g.categorias).reduce((sum, val) => sum + (val || 0), 0);
      }
    });
    
    return total;
  };

  const calcularGananciaReal = () => {
    const stats = rangoFechas.desde && rangoFechas.hasta ? calcularEstadisticasRango() : calcularEstadisticas();
    const totalGastos = rangoFechas.desde && rangoFechas.hasta ? calcularGastosRango() : calcularTotalGastos();
    return stats.montoPagado - totalGastos;
  };

  const calcularOcupacionPorCabana = () => {
    const cabañasArray = [1, 2, 3, 4, 5, 6, 7, 8, 9];
    return cabañasArray.map(num => {
      const reservasCabana = reservas.filter(r => r.cabaña === num);
      const totalNoches = reservasCabana.reduce((sum, r) => sum + calcularDias(r.fechaEntrada, r.fechaSalida), 0);
      return { cabaña: num, noches: totalNoches, reservas: reservasCabana.length };
    });
  };

  const calcularIngresoPorCabana = () => {
    const cabañasArray = [1, 2, 3, 4, 5, 6, 7, 8, 9];
    return cabañasArray.map(num => {
      const reservasCabana = reservas.filter(r => r.cabaña === num && r.pagado);
      const totalIngreso = reservasCabana.reduce((sum, r) => sum + calcularTotal(r), 0);
      return { cabaña: num, ingreso: totalIngreso };
    });
  };

  const handleSaveGasto = () => {
    const mes = currentMonth.getMonth();
    const ano = currentMonth.getFullYear();
    const key = `${ano}-${String(mes + 1).padStart(2, '0')}`;
    
    const nuevosGastos = gastos.filter(g => g.mesAno !== key);
    if (gastoMesActual) {
      nuevosGastos.push({ mesAno: key, categorias: gastoMesActual });
    }
    
    setGastos(nuevosGastos);
    setShowFormGasto(false);
    showAlert('success', '✅ Gastos guardados exitosamente');
  };

  const handleAddReserva = () => {
    if (!formData.clienteNombre || !formData.fechaEntrada || !formData.fechaSalida) {
      showAlert('error', '⚠️ Completa: Cliente, Fecha Entrada y Fecha Salida');
      return;
    }

    if (new Date(formData.fechaSalida) <= new Date(formData.fechaEntrada)) {
      showAlert('error', '⚠️ La fecha fin debe ser posterior al inicio');
      return;
    }

    const conflicto = reservas.find(r => {
      if (editingId && r.id === editingId) return false;
      if (r.cabaña !== formData.cabaña) return false;
      
      const nInicio = new Date(formData.fechaEntrada).getTime();
      const nFin = new Date(formData.fechaSalida).getTime();
      const eInicio = new Date(r.fechaEntrada).getTime();
      const eFin = new Date(r.fechaSalida).getTime();
      
      return (nInicio < eFin && nFin > eInicio);
    });

    if (conflicto) {
      showAlert('error', `🚫 ¡CABAÑA OCUPADA!\n\nLa Cabaña ${formData.cabaña} ya está reservada por: ${conflicto.clienteNombre}\n\nDesde: ${conflicto.fechaEntrada}\nHasta: ${conflicto.fechaSalida}\n\nPor favor elige otras fechas u otra cabaña.`);
      return;
    }

    let nuevas;
    if (editingId) {
      nuevas = reservas.map(r => r.id === editingId ? { ...formData, id: editingId, fechaModificacion: new Date().toISOString() } : r);
    } else {
      nuevas = [...reservas, { ...formData, id: Date.now(), fechaCreacion: new Date().toISOString() }];
    }
    
    setReservas(nuevas);
    setEditingId(null);
    setFormData(initialFormData);
    setShowForm(false);
    showAlert('success', '✅ Reserva guardada exitosamente');

    const inicio = new Date(fechaEntrada).setHours(0,0,0,0);
    const fin = new Date(fechaSalida).setHours(0,0,0,0);
    return d >= inicio && d <= fin;

                ❌ Cancelar
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
